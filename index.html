<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miniaturas | Datos de mueble</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #1f2937;
        background: #f3f4f6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(92vw, 460px);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }

      h1 {
        margin-top: 0;
        font-size: 1.35rem;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.95rem;
      }

      input {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 1rem;
      }

      input:focus {
        outline: 2px solid #2563eb;
        border-color: transparent;
      }

      button {
        margin-top: 6px;
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .result {
        margin-top: 16px;
        font-size: 0.95rem;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 12px;
        display: none;
      }

      .error {
        color: #b91c1c;
        font-size: 0.88rem;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Datos de miniatura</h1>
      <form id="miniatura-form" novalidate>
        <label>
          Nombre
          <input id="nombre" name="nombre" type="text" required />
        </label>

        <label>
          Ancho (en mm)
          <input id="ancho" name="ancho" type="number" min="0" step="0.1" required />
        </label>

        <label>
          Alto (en mm)
          <input id="alto" name="alto" type="number" min="0" step="0.1" required />
        </label>

        <label>
          Fondo (en mm)
          <input id="fondo" name="fondo" type="number" min="0" step="0.1" required />
        </label>

        <div id="error" class="error" aria-live="polite"></div>
        <button type="submit">Guardar datos</button>
      </form>

      <section id="result" class="result" aria-live="polite"></section>
    </main>

    <script>
      const form = document.getElementById('miniatura-form');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      const toNumber = (value) => Number.parseFloat(value);

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        error.textContent = '';

        const nombre = form.nombre.value.trim();
        const ancho = toNumber(form.ancho.value);
        const alto = toNumber(form.alto.value);
        const fondo = toNumber(form.fondo.value);

        if (!nombre || [ancho, alto, fondo].some((n) => Number.isNaN(n) || n <= 0)) {
          result.style.display = 'none';
          error.textContent = 'Completa todos los campos con valores válidos (mm > 0).';
          return;
        }

        result.innerHTML = `
          <strong>${nombre}</strong><br />
          Ancho: ${ancho} mm<br />
          Alto: ${alto} mm<br />
          Fondo: ${fondo} mm
        `;
        result.style.display = 'block';
      });
    </script>
  </body>
</html>
